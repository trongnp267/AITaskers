spring.application.name=aitasker-backend

# =====================================================================
# MAC DINH: dung H2 - database chay ngay trong bo nho, KHONG can cai dat
# SQL Server, KHONG can tao database, KHONG can user/password gi ca.
# Chi can chay "mvn spring-boot:run" la ung dung chay duoc ngay.
# Du lieu se MAT khi tat app (dung de test/phat trien, khong dung production).
#
# Khi nao muon chuyen sang SQL Server that (du lieu duoc luu lai), chay:
#   mvn spring-boot:run -Dspring-boot.run.profiles=sqlserver
# va chinh sua thong tin ket noi trong application-sqlserver.properties
# =====================================================================
spring.datasource.url=jdbc:h2:mem:aitaskerdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Giao dien xem du lieu trong database ngay tren trinh duyet:
# http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:aitaskerdb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------
# JWT - bat buoc phai co, khong thi app se crash ngay khi khoi dong voi loi
# "Could not resolve placeholder 'jwt.secret'"
# Chuoi ben duoi CHI DUNG CHO DEV/TEST, doi khi deploy that.
# ---------------------------------------------------------------------
jwt.secret=3f8H0a2Kz9pQ7rL4mN6sV1xC5bE8dG2jY9uT3wR7oP0iA6qZ4nM1cX8vB5hS2fD
jwt.exp-minutes=60

# ---------------------------------------------------------------------
# AI matching (Gemini API) - dien key that vao day neu muon dung /api/ai/match
# ---------------------------------------------------------------------
ai.gemini.api-key=YOUR_GEMINI_API_KEY_HERE
ai.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

server.port=8080

# Bat log chi tiet cho phan xac thuc JWT - de neu con loi 403, terminal se in
# ra rate ro ly do (token het han, sai chu ky, user khong ton tai...)
logging.level.com.aitasker.backend.security=DEBUG

# Swagger UI: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
