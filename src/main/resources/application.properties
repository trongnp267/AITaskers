spring.application.name=aitasker-backend

# =====================================================================
# MAC DINH: profile "sqlserver" duoc BAT SAN (dong ben duoi) -> du lieu
# duoc LUU THAT vao SQL Server (database AITaskerDB), tat app khong mat.
# Thong tin ket noi nam trong application-sqlserver.properties.
#
# Neu may KHONG co SQL Server va chi muon chay thu nhanh bang H2 in-memory
# (du lieu mat khi tat app): xoa/comment dong spring.profiles.active ben duoi.
# =====================================================================
spring.profiles.active=sqlserver
spring.datasource.url=jdbc:h2:mem:aitaskerdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Giao dien xem du lieu trong database ngay tren trinh duyet:
# http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:aitaskerdb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------
# JWT - bat buoc phai co, khong thi app se crash ngay khi khoi dong voi loi
# "Could not resolve placeholder 'jwt.secret'"
# Chuoi ben duoi CHI DUNG CHO DEV/TEST, doi khi deploy that.
# ---------------------------------------------------------------------
jwt.secret=3f8H0a2Kz9pQ7rL4mN6sV1xC5bE8dG2jY9uT3wR7oP0iA6qZ4nM1cX8vB5hS2fD
# 52,560,000 phut = 100 nam ~ dang nhap khong bao gio het han (theo yeu cau
# demo do an; app that nen dat ngan lai, vi token lo ra la ai cung dung duoc).
jwt.exp-minutes=52560000

# ---------------------------------------------------------------------
# AI matching (Gemini API) - de dung tinh nang "Tro ly AI" (phan tich mo ta,
# goi y expert), lay key MIEN PHI tai https://aistudio.google.com/apikey.
# Key doc tu bien moi truong AI_GEMINI_API_KEY (KHONG dien key that vao
# file nay - repo public, lo key nguoi khac dung chua). Cach dat tren
# Windows:  setx AI_GEMINI_API_KEY "AIza..."  roi mo terminal moi.
# ---------------------------------------------------------------------
ai.gemini.api-key=${AI_GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}
ai.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent

server.port=8080

# Bat log chi tiet cho phan xac thuc JWT - de neu con loi 403, terminal se in
# ra rate ro ly do (token het han, sai chu ky, user khong ton tai...)
logging.level.com.aitasker.backend.security=DEBUG

# Swagger UI: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
