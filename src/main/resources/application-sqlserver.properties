# =====================================================================
# Profile SQL SERVER - chi dung khi ban da cai/co san SQL Server that va
# muon du lieu duoc LUU LAI (khac voi H2 mac dinh se mat du lieu khi tat app).
#
# Cach dung:
#   mvn spring-boot:run -Dspring-boot.run.profiles=sqlserver
# =====================================================================

# 1. Truoc tien phai tu tao database rong (Hibernate chi tu tao BANG,
#    khong tu tao DATABASE):
#      CREATE DATABASE AITaskerDB;
#
# 2. Dam bao SQL Server dang bat "SQL Server and Windows Authentication mode"
#    (SSMS -> chuot phai server -> Properties -> Security), va user 'sa'
#    dang o trang thai Enabled voi dung mat khau ban dien ben duoi.
#
# 3. Sua lai 3 dong duoi day cho dung voi SQL Server cua ban:
# Luu y: dung database rieng "AITaskerAppDB" cho ung dung. Database "AITaskerDB"
# cu (neu co) la noi script sql/01_test_script_demo.sql tung chay - bang "Users"
# trong do trung ten voi bang "users" cua app nen KHONG dung chung duoc.
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=AITaskerAppDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=aitasker
spring.datasource.password=AITasker@2026
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.h2.console.enabled=false
