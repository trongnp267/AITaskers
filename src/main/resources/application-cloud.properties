# =====================================================================
# Profile CLOUD - dung khi deploy backend len hosting (Render/Railway...)
# voi database PostgreSQL mien phi (Neon/Supabase).
# Moi thong tin nhay cam deu doc tu BIEN MOI TRUONG cua hosting:
#   SPRING_PROFILES_ACTIVE = cloud
#   DATABASE_URL           = jdbc:postgresql://.../dbname?sslmode=require
#   DATABASE_USER          = ten dang nhap DB
#   DATABASE_PASSWORD      = mat khau DB
#   JWT_SECRET             = chuoi bi mat ky token (tu dat, dai ~64 ky tu)
#   AI_GEMINI_API_KEY      = key Gemini (neu muon bat tinh nang AI)
# =====================================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Hosting cap cong qua bien PORT (Render/Railway); mac dinh 8080 khi chay tay
server.port=${PORT:8080}

spring.h2.console.enabled=false
