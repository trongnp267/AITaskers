# Ket noi Database AITasker_Thao
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=AITasker_Thao;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-className=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Cau hinh Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect