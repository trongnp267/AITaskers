spring.application.name=demo
server.port=8081

# Chuỗi kết nối Database SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=AITasker_Minh;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# CẤU HÌNH FIX LỖI: Tách biệt rạch ròi Dialect và Ddl-auto chuẩn Spring Boot 3.x
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update

# Hiển thị câu lệnh SQL dưới Console để tiện theo dõi
spring.jpa.show-sql=true